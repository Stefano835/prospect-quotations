name: Aggiorna quotazioni

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run fetch_quotations.py
        run: python fetch_quotations.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/quotations.json
          if git diff --staged --quiet; then
            echo "Nessuna nuova quotazione, niente da committare."
          else
            git commit -m "auto-update: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
